<!doctype html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8">
    <meta http-equiv="refresh" content="60">
    <title>淘宝商品销售数据可视化分析</title>
    <script type="text/javascript" src="taobaoGoodsAnalyse/js/jquery.js"></script>
    <link rel="stylesheet" href="taobaoGoodsAnalyse/css/comon0.css">
    <script type="text/javascript" src="taobaoGoodsAnalyse/js/echarts.min.js"></script>
    <script type="text/javascript" src="taobaoGoodsAnalyse/js/china.js"></script>
    <script type="text/javascript" src="taobaoGoodsAnalyse/js/area_echarts.js"></script>
    <script language="JavaScript"  src="taobaoGoodsAnalyse/js/js.js"></script>
</head>

<script>
    $(window).load(function () {
        $(".loading").fadeOut()
    })


    $(document).ready(function () {
        var whei = $(window).width()
        $("html").css({ fontSize: whei / 20 })
        $(window).resize(function () {
            var whei = $(window).width()
            $("html").css({ fontSize: whei / 20 })
        });
    });
</script>

<body>
    <div class="loading">
        <div class="loadbox"> <img src="taobaoGoodsAnalyse/images/loading.gif"> 页面加载中... </div>
    </div>
    <div class="head">
        <h1><span style="color: deepskyblue">淘宝商品销售数据可视化分析</span></h1>
        <div class="weather"><span id="showTime"></span></div>

        <script>
            var t = null;
            t = setTimeout(time, 1000); 
            function time() {
                clearTimeout(t); 
                dt = new Date();
                var y = dt.getFullYear();
                var mt = dt.getMonth() + 1;
                var day = dt.getDate();
                var h = dt.getHours(); 
                var m = dt.getMinutes(); 
                var s = dt.getSeconds(); 
                document.getElementById("showTime").innerHTML = y + "年" + mt + "月" + day + "-" + h + "时" + m + "分" + s + "秒";
                t = setTimeout(time, 1000);  
            }

        </script>


    </div>
    <div class="mainbox">
        <ul class="clearfix">
            <li>
                <div class="boxall" style="height: 4.5rem">
                    <div class="alltitle">店铺的销量排名</div>
                    <div class="allnav" id="echart1"></div>
                    <div class="boxfoot"></div>
                </div>
                <div class="boxall" style="height: 4.5rem">
                    <div class="alltitle">每种商品的销量</div>
                    <div class="allnav" id="echart2"></div>
                    <div class="boxfoot"></div>
                </div>
            </li>
            <li>
            <div class="map">
                <div class="map1"><img src="taobaoGoodsAnalyse/images/lbx.png"></div>
                <div class="map2"><img src="taobaoGoodsAnalyse/images/jt.png"></div>
                <div class="map3"><img src="taobaoGoodsAnalyse/images/map.png"></div>
                <div class="map4" id="map_1"></div>
            </div>


            </li>
            <li>
                <div class="boxall" style="height:4.5rem">
                    <div class="alltitle">城市的商品销量排名</div>
                    <div class="allnav" id="echart4"></div>
                    <div class="boxfoot"></div>
                </div>
                <div class="boxall" style="height: 4.5rem">
                    <div class="alltitle">每个城市的商品均价分析</div>
                    <div class="allnav" id="echart3"></div>
                    <div class="boxfoot"></div>
                </div>
            </li>
        </ul>
    </div>
    <div class="back"></div>





</body>




</html>
