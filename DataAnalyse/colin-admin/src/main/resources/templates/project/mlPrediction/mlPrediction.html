<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI智能预测中心</title>
    <link rel="shortcut icon" href="favicon.ico">
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet"/>
    <link th:href="@{/css/font-awesome.min.css}" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --bg-primary: #0a0e1a;
            --bg-card: rgba(17,24,39,0.88);
            --border-subtle: rgba(99,102,241,0.12);
            --border-active: rgba(99,102,241,0.4);
            --accent-blue: #6366f1; --accent-cyan: #22d3ee; --accent-purple: #a855f7;
            --accent-pink: #ec4899; --accent-green: #10b981; --accent-orange: #f59e0b; --accent-red: #ef4444;
            --text-primary: #f1f5f9; --text-secondary: #94a3b8; --text-muted: #64748b;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:var(--bg-primary);color:var(--text-primary);font-family:'Inter','Microsoft YaHei',sans-serif;min-height:100vh;overflow-x:hidden}
        body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse 80% 50% at 20% 20%,rgba(99,102,241,0.07),transparent),radial-gradient(ellipse 60% 40% at 80% 80%,rgba(34,211,238,0.05),transparent);pointer-events:none;z-index:0}

        .header{position:relative;z-index:1;padding:28px 32px 18px;text-align:center;background:linear-gradient(180deg,rgba(17,24,39,0.95) 0%,transparent 100%)}
        .header-top{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:6px}
        .header-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 14px;background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.2);border-radius:20px;font-size:11px;font-weight:500;color:var(--accent-cyan);letter-spacing:1px;text-transform:uppercase}
        .header-badge .dot{width:6px;height:6px;border-radius:50%;background:var(--accent-green);animation:pulse-dot 2s infinite}
        @keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(1.5)}}
        .header h1{font-size:30px;font-weight:700;letter-spacing:-0.5px;background:linear-gradient(135deg,#fff 0%,#c7d2fe 50%,var(--accent-cyan) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .header-subtitle{margin-top:8px;font-size:13px;color:var(--text-muted)}
        .header-subtitle code{background:rgba(99,102,241,0.08);padding:2px 8px;border-radius:4px;color:var(--accent-purple);font-size:11px;margin:0 2px}

        .status-bar{text-align:center;padding:10px 20px;margin:0 32px;background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:12px;font-size:13px;color:var(--text-secondary);backdrop-filter:blur(20px)}
        .status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;vertical-align:middle}
        .status-online{background:var(--accent-green);box-shadow:0 0 12px rgba(16,185,129,0.5)}
        .status-offline{background:var(--accent-red);box-shadow:0 0 12px rgba(239,68,68,0.5)}

        .toolbar{position:relative;z-index:1;display:flex;justify-content:center;gap:7px;margin:14px 32px;flex-wrap:wrap}
        .btn-ml{display:inline-flex;align-items:center;gap:5px;padding:9px 18px;border:1px solid var(--border-subtle);border-radius:10px;cursor:pointer;font-size:12px;font-weight:500;color:var(--text-secondary);background:var(--bg-card);backdrop-filter:blur(10px);transition:all 0.25s;font-family:inherit;white-space:nowrap}
        .btn-ml:hover{border-color:var(--border-active);color:var(--text-primary);background:rgba(99,102,241,0.08);transform:translateY(-1px)}
        .btn-ml.active{border-color:var(--accent-blue);color:#fff;background:linear-gradient(135deg,rgba(99,102,241,0.18),rgba(34,211,238,0.08));box-shadow:0 0 16px rgba(99,102,241,0.15)}
        .btn-all{border-color:var(--accent-purple);color:var(--accent-purple)}
        .btn-all:hover,.btn-all.active{background:linear-gradient(135deg,rgba(168,85,247,0.18),rgba(236,72,153,0.08));color:#fff}

        .dashboard{position:relative;z-index:1;display:grid;grid-template-columns:repeat(3,1fr);gap:16px;padding:16px 32px 40px;max-width:1600px;margin:0 auto}
        .card{background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:16px;padding:20px;backdrop-filter:blur(20px);transition:all 0.3s cubic-bezier(0.4,0,0.2,1);position:relative;overflow:hidden}
        .card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(99,102,241,0.3),transparent);opacity:0;transition:opacity 0.3s}
        .card::after{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle,rgba(99,102,241,0.03) 0%,transparent 70%);opacity:0;transition:opacity 0.3s;pointer-events:none}
        .card:hover{border-color:var(--border-active);transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,0.35),0 0 30px rgba(99,102,241,0.08)}
        .card:hover::before{opacity:1}
        .card:hover::after{opacity:1}
        .card-title{font-size:15px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:10px;color:var(--text-primary);letter-spacing:-0.3px}
        .card-title .icon{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:10px;font-size:15px;transition:all 0.3s}
        .card:hover .icon{transform:scale(1.1) rotate(-3deg)}
        .icon-blue{background:linear-gradient(135deg,rgba(99,102,241,0.2),rgba(99,102,241,0.05));border:1px solid rgba(99,102,241,0.15)}
        .icon-pink{background:linear-gradient(135deg,rgba(236,72,153,0.2),rgba(236,72,153,0.05));border:1px solid rgba(236,72,153,0.15)}
        .icon-cyan{background:linear-gradient(135deg,rgba(34,211,238,0.2),rgba(34,211,238,0.05));border:1px solid rgba(34,211,238,0.15)}
        .icon-orange{background:linear-gradient(135deg,rgba(245,158,11,0.2),rgba(245,158,11,0.05));border:1px solid rgba(245,158,11,0.15)}
        .icon-green{background:linear-gradient(135deg,rgba(16,185,129,0.2),rgba(16,185,129,0.05));border:1px solid rgba(16,185,129,0.15)}
        .icon-purple{background:linear-gradient(135deg,rgba(168,85,247,0.2),rgba(168,85,247,0.05));border:1px solid rgba(168,85,247,0.15)}

        .chart-container{width:100%;height:320px;position:relative}
        .metrics-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:16px}
        .metric-item{background:linear-gradient(135deg,rgba(99,102,241,0.06),rgba(99,102,241,0.02));border:1px solid rgba(99,102,241,0.08);border-radius:14px;padding:14px 10px;text-align:center;transition:all 0.3s cubic-bezier(0.4,0,0.2,1);position:relative;overflow:hidden}
        .metric-item::before{content:'';position:absolute;top:0;left:0;width:100%;height:2px;background:linear-gradient(90deg,var(--accent-blue),var(--accent-cyan));opacity:0;transition:opacity 0.3s}
        .metric-item:hover{background:linear-gradient(135deg,rgba(99,102,241,0.1),rgba(99,102,241,0.04));border-color:rgba(99,102,241,0.15);transform:translateY(-2px);box-shadow:0 4px 15px rgba(99,102,241,0.1)}
        .metric-item:hover::before{opacity:1}
        .metric-value{font-size:20px;font-weight:700;color:var(--accent-cyan);font-variant-numeric:tabular-nums;line-height:1.2;text-shadow:0 0 20px rgba(34,211,238,0.2)}
        .metric-label{font-size:10px;color:var(--text-muted);margin-top:4px;font-weight:500;text-transform:uppercase;letter-spacing:0.5px}

        .loading-overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(10,14,26,0.94);display:none;justify-content:center;align-items:center;z-index:100;border-radius:16px;backdrop-filter:blur(8px)}
        .spinner{width:36px;height:36px;border:3px solid rgba(99,102,241,0.15);border-top-color:var(--accent-blue);border-radius:50%;animation:spin 0.8s linear infinite;box-shadow:0 0 15px rgba(99,102,241,0.2)}
        @keyframes spin{to{transform:rotate(360deg)}}

        .table-wrapper{overflow-x:auto;max-height:340px;overflow-y:auto;border-radius:12px;border:1px solid rgba(99,102,241,0.06);background:rgba(17,24,39,0.3);margin-top:14px}
        .table-wrapper::-webkit-scrollbar{width:6px;height:6px}.table-wrapper::-webkit-scrollbar-track{background:rgba(99,102,241,0.02);border-radius:3px}
        .table-wrapper::-webkit-scrollbar-thumb{background:linear-gradient(180deg,var(--accent-blue),var(--accent-purple));border-radius:3px}
        table{width:100%;border-collapse:collapse;font-size:12px}
        th{background:linear-gradient(135deg,rgba(99,102,241,0.08),rgba(168,85,247,0.04));padding:11px 14px;text-align:left;color:var(--text-secondary);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:0.5px;position:sticky;top:0;z-index:1;border-bottom:1px solid rgba(99,102,241,0.1)}
        td{padding:9px 14px;border-bottom:1px solid rgba(99,102,241,0.03);color:var(--text-secondary);transition:background 0.2s}
        tr:hover td{background:rgba(99,102,241,0.04)}
        .tag{display:inline-block;padding:3px 10px;border-radius:6px;font-size:10px;font-weight:600;letter-spacing:0.3px}
        .tag-high{background:linear-gradient(135deg,rgba(16,185,129,0.15),rgba(16,185,129,0.05));color:var(--accent-green);border:1px solid rgba(16,185,129,0.2)}
        .tag-medium{background:linear-gradient(135deg,rgba(245,158,11,0.15),rgba(245,158,11,0.05));color:var(--accent-orange);border:1px solid rgba(245,158,11,0.2)}
        .tag-low{background:linear-gradient(135deg,rgba(239,68,68,0.15),rgba(239,68,68,0.05));color:var(--accent-red);border:1px solid rgba(239,68,68,0.2)}
        .insight-box{background:linear-gradient(135deg,rgba(168,85,247,0.08),rgba(99,102,241,0.06));border:1px solid rgba(168,85,247,0.12);border-left:3px solid var(--accent-purple);padding:14px 18px;margin-top:16px;border-radius:0 12px 12px 0;font-size:12px;line-height:1.8;color:var(--text-secondary);transition:all 0.3s}
        .insight-box:hover{background:linear-gradient(135deg,rgba(168,85,247,0.1),rgba(99,102,241,0.08));border-left-width:4px}
        .insight-title{color:var(--accent-purple);font-weight:600;margin-bottom:6px;font-size:13px;display:flex;align-items:center;gap:6px}
        .insight-title::before{content:'\u1F916';font-size:14px}
        .col-span-3{grid-column:span 3}

        /* 高级动画 */
        @keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        .card{animation:fadeInUp 0.5s ease-out backwards}
        .card:nth-child(1){animation-delay:0.05s}.card:nth-child(2){animation-delay:0.1s}.card:nth-child(3){animation-delay:0.15s}
        .card:nth-child(4){animation-delay:0.2s}.card:nth-child(5){animation-delay:0.25s}.card:nth-child(6){animation-delay:0.3s}
    </style>
</head>
<body>

<div class="header">
    <div class="header-top"><span class="header-badge"><span class="dot"></span> AI Powered</span></div>
    <h1>机器学习预测分析中心</h1>
    <div class="header-subtitle">基于 <code>Holt-Winters</code> <code>GBDT</code> <code>Random Forest</code> <code>KMeans</code> 的智能预测系统</div>
</div>

<div class="status-bar" id="serviceStatus">
    <span class="status-dot status-offline" id="statusDot"></span>
    <span id="statusText">正在检测ML服务状态...</span>
    <div style="margin-left:auto;display:flex;gap:8px;align-items:center;">
        <button onclick="checkServiceStatus()" style="background:rgba(99,102,241,0.15);border:1px solid rgba(99,102,241,0.3);color:#94a3b8;padding:4px 12px;border-radius:6px;font-size:11px;cursor:pointer;transition:all 0.2s;" onmouseover="this.style.background='rgba(99,102,241,0.25)';this.style.color='#fff'" onmouseout="this.style.background='rgba(99,102,241,0.15)';this.style.color='#94a3b8'">🔄 重新检测</button>
        <button onclick="runAllPredictions()" style="background:rgba(16,185,129,0.15);border:1px solid rgba(16,185,129,0.3);color:#10b981;padding:4px 12px;border-radius:6px;font-size:11px;cursor:pointer;transition:all 0.2s;font-weight:600;" onmouseover="this.style.background='rgba(16,185,129,0.25)';this.style.color='#34d399'" onmouseout="this.style.background='rgba(16,185,129,0.15)';this.style.color='#10b981'">🚀 立即预测</button>
        <button onclick="toggleDebugPanel()" id="debugToggleBtn" style="background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.25);color:#f59e0b;padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;transition:all 0.2s;" onmouseover="this.style.background='rgba(245,158,11,0.2)'" onmouseout="this.style.background='rgba(245,158,11,0.1)'">🔧 调试</button>
    </div>
</div>

<div id="debugPanel" style="display:none;margin:14px 32px;background:rgba(17,24,39,0.95);border:1px solid rgba(245,158,11,0.25);border-radius:12px;padding:16px;font-family:'Courier New',monospace;font-size:11px;color:#e2e8f0;backdrop-filter:blur(10px);">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid rgba(245,158,11,0.15);">
        <span style="color:#f59e0b;font-weight:600;font-size:13px;">🔧 API调试面板</span>
        <span style="color:#64748b;font-size:10px;">实时显示请求/响应 | 刷新页面自动检测</span>
    </div>
    <div id="debugContent" style="max-height:300px;overflow-y:auto;line-height:1.6;">
        <div style="color:#64748b;padding:8px;background:rgba(99,102,241,0.05);border-radius:6px;margin-bottom:8px;">等待检测...</div>
    </div>
</div>

<div class="toolbar">
    <button class="btn-ml btn-all active" onclick="runAllPredictions()">🚀 一键预测</button>
    <button class="btn-ml btn-sales" onclick="runPrediction('sales')">📈 销量预测</button>
    <button class="btn-ml btn-price" onclick="runPrediction('price')">💰 价格弹性</button>
    <button class="btn-ml btn-gmv" onclick="runPrediction('gmv')">🏪 GMV预测</button>
    <button class="btn-ml btn-heat" onclick="runPrediction('heat')">🔥 热度分析</button>
    <button class="btn-ml btn-region" onclick="runPrediction('region')">🗺️ 地区分析</button>
    <button class="btn-ml btn-trend" onclick="runPrediction('trend')">📊 品类趋势</button>
</div>

<div class="dashboard" id="dashboard">
    <!-- 1. 时序销量预测 - 多轴组合图 -->
    <div class="card col-span-3" id="salesCard">
        <div class="card-title"><span class="icon icon-blue">📈</span>时序销量预测<span style="margin-left:auto;font-size:10px;color:var(--text-muted)">Holt-Winters + KDE密度分布</span></div>
        <div class="metrics-row" id="salesMetrics"></div>
        <div class="chart-container" id="salesChart" style="height:400px;"></div>
        <div class="insight-box" id="salesInsight"></div>
        <div class="loading-overlay"><div class="spinner"></div></div>
    </div>

    <!-- 2. 价格弹性分析 - 平滑Spline + 弹性雷达 -->
    <div class="card col-span-3" id="priceCard">
        <div class="card-title"><span class="icon icon-pink">💰</span>价格弹性分析<span style="margin-left:auto;font-size:10px;color:var(--text-muted)">平滑曲线 + 弹性分布雷达</span></div>
        <div class="metrics-row" id="priceMetrics"></div>
        <div style="display:flex;gap:16px;">
            <div class="chart-container" id="priceChart" style="flex:1.5;height:360px;"></div>
            <div class="chart-container" id="priceRadar" style="flex:0.75;height:360px;"></div>
        </div>
        <div class="table-wrapper" id="priceTable"></div>
        <div class="loading-overlay"><div class="spinner"></div></div>
    </div>

    <!-- 3. 店铺GMV - 渐变条形 + 多维雷达 -->
    <div class="card col-span-3" id="gmvCard">
        <div class="card-title"><span class="icon icon-cyan">🏪</span>GMV潜力评估<span style="margin-left:auto;font-size:10px;color:var(--text-muted)">渐变排名 + Top5多维蜘蛛图</span></div>
        <div class="metrics-row" id="gmvMetrics"></div>
        <div style="display:flex;gap:16px;">
            <div class="chart-container" id="gmvChart" style="flex:1.35;height:360px;"></div>
            <div class="chart-container" id="gmvRadar" style="flex:0.8;height:360px;"></div>
        </div>
        <div class="table-wrapper" id="gmvTable"></div>
        <div class="loading-overlay"><div class="spinner"></div></div>
    </div>

    <!-- 4. 商品热度 - Sunburst旭日图 -->
    <div class="card col-span-3" id="heatCard">
        <div class="card-title"><span class="icon icon-orange">🔥</span>商品热度预测<span style="margin-left:auto;font-size:10px;color:var(--text-muted)">Treemap树形热力图 + 热度分布</span></div>
        <div class="metrics-row" id="heatMetrics"></div>
        <div class="chart-container" id="heatChart" style="height:420px;"></div>
        <div class="table-wrapper" id="heatTable"></div>
        <div class="loading-overlay"><div class="spinner"></div></div>
    </div>

    <!-- 5. 地区销量 - 气泡矩阵 + 排名 + 聚类雷达 -->
    <div class="card col-span-3" id="regionCard">
        <div class="card-title"><span class="icon icon-green">🗺️</span>地区销量分布<span style="margin-left:auto;font-size:10px;color:var(--text-muted)">气泡热力矩阵 + 排名条 + 聚类对比</span></div>
        <div class="metrics-row" id="regionMetrics"></div>
        <div style="display:flex;gap:16px;">
            <div class="chart-container" id="regionChart" style="flex:1.3;height:370px;"></div>
            <div class="chart-container" id="regionBarChart" style="flex:0.65;height:370px;"></div>
            <div class="chart-container" id="regionRadar" style="flex:0.65;height:370px;"></div>
        </div>
        <div class="table-wrapper" id="regionTable"></div>
        <div class="loading-overlay"><div class="spinner"></div></div>
    </div>

    <!-- 6. 品类趋势 - Stream河流图 + 属性雷达 -->
    <div class="card col-span-3" id="trendCard">
        <div class="card-title"><span class="icon icon-purple">📊</span>品类趋势预测<span style="margin-left:auto;font-size:10px;color:var(--text-muted)">Stream堆叠面积图 + 属性雷达</span></div>
        <div class="metrics-row" id="trendMetrics"></div>
        <div style="display:flex;gap:16px;">
            <div class="chart-container" id="trendChart" style="flex:1.3;height:380px;"></div>
            <div class="chart-container" id="trendRadar" style="flex:0.85;height:380px;"></div>
        </div>
        <div class="table-wrapper" id="trendTable"></div>
        <div class="insight-box" id="trendInsight"></div>
        <div class="loading-overlay"><div class="spinner"></div></div>
    </div>
</div>

<script th:inline="javascript">/*<![CDATA[*/
var ctx = [[@{/}]];
/*]]>*/</script>
<script th:src="@{/js/jquery.min.js?v=3.6.0}"></script>
<script th:src="@{/js/bootstrap.min.js?v=3.3.7}"></script>
<script th:src="@{/ajax/libs/layer/layer.min.js?v=3.5.1}"></script>
<script th:src="@{/ajax/libs/report/echarts/echarts-all.min-new.js?v=5.4.2}"></script>
<script th:inline="none">/*<![CDATA[*/
var prefix = ctx + "project/mlPrediction";
var charts = {};
var debugLogs = [];

function addDebugLog(type, msg) {
    var time = new Date().toLocaleTimeString();
    var color = type === 'success' ? '#10b981' : (type === 'error' ? '#ef4444' : (type === 'warn' ? '#f59e0b' : '#6366f1'));
    var icon = type === 'success' ? '[OK]' : (type === 'error' ? '[X]' : (type === 'warn' ? '[!]' : '[i]'));
    debugLogs.push({time: time, type: type, icon: icon, msg: msg, color: color});
    if(debugLogs.length > 20) debugLogs.shift(); // 只保留最近20条
    renderDebugPanel();
}

function renderDebugPanel() {
    var html = '';
    for(var i=debugLogs.length-1; i>=0; i--){
        var log = debugLogs[i];
        var bg = log.type==='success'?'rgba(16,185,129,0.08)':(log.type==='error'?'rgba(239,68,68,0.08)':'rgba(99,102,241,0.05)');
        html += '<div style="padding:6px 10px;margin-bottom:4px;background:'+bg+';border-radius:4px;border-left:3px solid '+log.color+';">'+
               '<span style="color:#64748b">'+log.time+'</span> <span style="color:'+log.color+';font-weight:600">'+log.icon+'</span> '+
               '<span style="color:#e2e8f0">'+log.msg+'</span></div>';
    }

/* ========== 1. 时序销量 - 折线+置信带+底部KDE密度直方图（增强版） ========== */
function renderSalesForecast(data) {
    var h=data.history||[], p=data.prediction||[], c=data.components||{}, a=data.model_accuracy||{};
    var dates=[]; for(var i=0;i<h.length;i++) dates.push(h[i].date);
    for(i=0;i<p.length;i++) dates.push(p[i].date);

    var actual=[], pred=[], ub=[], lb=[];
    for(i=0;i<h.length;i++) actual.push(h[i].sales_count/10000000);
    for(i=0;i<h.length;i++){pred.push(null);ub.push(null);lb.push(null);}
    for(i=0;i<p.length;i++){pred.push(p[i].predicted_sales/10000000);ub.push(p[i].upper_bound/10000000);lb.push(p[i].lower_bound/10000010);}

    var td=c.trend||'-'; var tc=td==='\u4E0A\u5347'?'#10b981':'#ef4444';
    $('#salesMetrics').html(
        '<div class="metric-item"><div class="metric-value">'+(a.mape||0)+'%</div><div class="metric-label">MAPE</div></div>'+
        '<div class="metric-item"><div class="metric-value">'+(a.r2||0)+'</div><div class="metric-label">R\u00B2</div></div>'+
        '<div class="metric-item"><div class="metric-value">'+p.length+'</div><div class="metric-label">\u9884\u6D4B\u5929\u6570</div></div>'+
        '<div class="metric-item"><div class="metric-value" style="color:'+tc+'">'+td+'</div><div class="metric-label">\u8D8B\u52BF</div></div>'
    );
    $('#salesInsight').html('<div class="insight-title">AI洞察</div>'+(td==='\u4E0A\u5347'?'\uD83D\uDCC8 销量呈上升趋势，建议增加库存准备':'\uD83D\uDCC9 销量趋于平稳或下降，需关注市场变化'));

    /* 构建增强版KDE数据 - 使用更平滑的分布 */
    var validPred=pred.filter(function(x){return x!=null});
    var mx=Math.max.apply(null,validPred)||1, mn=Math.min.apply(null,validPred)||0;
    var kde=[];
    for(var k=0;k<=30;k++){
        var v=mn+(mx-mn)*k/30*1.1;
        var mu=(mx+mn)/2, sigma=Math.abs(mx-mn)/4;
        kde.push([v.toFixed(2), (1/(sigma*Math.sqrt(2*Math.PI)))*Math.exp(-Math.pow(v-mu,2)/(2*Math.pow(sigma,2)))*85]);
    }

    charts.sales.setOption({
        backgroundColor:'transparent',
        tooltip:{
            trigger:'axis',
            backgroundColor:'rgba(15,20,35,0.96)',
            borderColor:'rgba(99,102,241,0.4)',
            borderWidth:1,
            textStyle:{color:'#e2e8f0',fontSize:12},
            extraCssText:'box-shadow:0 8px 32px rgba(0,0,0,0.4);border-radius:8px'
        },
        legend:{
            data:['实际销量','预测销量','95%置信区间','KDE概率密度'],
            textStyle:{color:'#94a3b8',fontSize:11},
            top:6,itemGap:18,
            itemWidth:16,itemHeight:8,borderRadius:4
        },
        grid:[
            {left:'4%',right:'10%',bottom:'24%',top:'40px',containLabel:true},
            {left:'4%',right:'10%',bottom:'2%',height:'18%',containLabel:true}
        ],
        xAxis:[
            {type:'category',data:dates,gridIndex:0,axisLabel:{rotate:30,color:'#64748b',fontSize:9,interval:3},
             axisLine:{lineStyle:{color:'rgba(99,102,241,0.12)'}},
             axisTick:{show:false}},
            {type:'value',gridIndex:1,axisLabel:{color:'#64748b',fontSize:9},splitLine:{show:false}}
        ],
        yAxis:[
            {type:'value',name:'销量(千万)',gridIndex:0,nameTextStyle:{color:'#94a3b8',fontSize:11,padding:[0,0,0,20]},
             axisLabel:{color:'#64748b'},
             splitLine:{lineStyle:{color:'rgba(99,102,241,0.04)',type:'dashed'}}},
            {type:'value',gridIndex:1,axisLabel:{show:false},splitLine:{show:false}}
        ],
        series:[
            {name:'实际销量',type:'line',xAxisIndex:0,yAxisIndex:0,data:actual,smooth:true,symbolSize:5,
             lineStyle:{width:2.8,color:new echarts.graphic.LinearGradient(0,0,1,0,[{offset:0,color:'#22d3ee'},{offset:1,color:'#06b6d4'}])},
             itemStyle:{color:'#22d3ee',borderColor:'#0a0e1a',borderWidth:2},
             areaStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'rgba(34,211,238,0.25)'},{offset:1,color:'rgba(34,211,238,0)'}])},
             emphasis:{focus:'series'}},
            {name:'预测销量',type:'line',xAxisIndex:0,yAxisIndex:0,data:pred,smooth:true,symbolSize:6,
             lineStyle:{width:2.8,color:new echarts.graphic.LinearGradient(0,0,1,0,[{offset:0,color:'#a855f7'},{offset:1,color:'#7c3aed'}]),type:[5,5]},
             itemStyle:{color:'#a855f7',borderColor:'#0a0e1a',borderWidth:2},
             markPoint:{
                 data:[{coord:[h.length-1,null],symbol:'diamond',symbolSize:12,itemStyle:{color:'#a855f7'},label:{show:true,formatter:'预测起点',color:'#a855f7',fontSize:9,position:'top'}}],
                 animationDelay:500
             },
             markLine:{data:[{xAxis:h.length-1,lineStyle:{color:'rgba(168,85,247,0.4)',type:'dashed',width:1},label:{formatter:' ',show:false}}],silent:true}},
            {name:'95%置信区间',type:'line',xAxisIndex:0,yAxisIndex:0,data:ub,lineStyle:{opacity:0},
             areaStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'rgba(168,85,247,0.18)'},{offset:1,color:'rgba(168,85,247,0.03)'}])},
             silent:true,z:1},
            {type:'line',xAxisIndex:0,yAxisIndex:0,data:lb,lineStyle:{opacity:0},
             areaStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'rgba(168,85,247,0)'},{offset:1,color:'rgba(168,85,247,0.18)'}])},
             silent:true,z:1},
            {name:'KDE概率密度',type:'bar',xAxisIndex:1,yAxisIndex:1,data:kde,
             itemStyle:{
                 color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'rgba(99,102,241,0.6)'},{offset:0.5,color:'rgba(139,92,246,0.35)'},{offset:1,color:'rgba(99,102,241,0.05)'}]),
                 borderRadius:[3,3,0,0]
             },
             barWidth:'88%',
             emphasis:{itemStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'rgba(99,102,241,0.8)'},{offset:1,color:'rgba(139,92,246,0.5)'}])}},
             tooltip:{formatter:function(p){return'<b>KDE概率密度</b><br/>值: '+p.value[0]+'<br/>密度: '+p.value[1].toFixed(2)}}}
        ],
        animationDuration:1500,
        animationEasingUpdate:'cubicInOut'
    }, true);
}

/* ========== 2. 价格弹性 - 平滑Spline曲线 + 弹性雷达图（增强版） ========== */
function renderPriceElasticity(data) {
    var an=data.price_analysis||[], m=data.model_metrics||{}, ins=data.insights||{};
    $('#priceMetrics').html(
        '<div class="metric-item"><div class="metric-value">'+(m.sales_r2||0)+'</div><div class="metric-label">销售R\u00B2</div></div>'+
        '<div class="metric-item"><div class="metric-value">'+(m.amount_r2||0)+'</div><div class="metric-label">营收R\u00B2</div></div>'+
        '<div class="metric-item"><div class="metric-value" style="font-size:12px;color:#ec4899">'+(ins.best_price_range||'-')+'</div><div class="metric-label">最优价位</div></div>'
    );

    var rng=[], sls=[], els=[], pts=[];
    for(var ai=0;ai<an.length;ai++){
        rng.push(an[ai].price_range);
        sls.push(an[ai].actual_sales/1000000);
        els.push(Math.abs(an[ai].elasticity||0)*10);
        pts.push({value:[ai,(an[ai].actual_sales/1000000)],itemStyle:{color:'#ec4899',shadowBlur:8,shadowColor:'rgba(236,72,153,0.3)'}})
    }

    /* 移动平均平滑 + 贝塞尔插值 */
    var ssm=sls.map(function(v,i,a){var w=2,n=v;for(var j=Math.max(0,i-w);j<=Math.min(a.length-1,i+w);j++)n+=a[j];return n/(w*2+1)});
    var ess=els.map(function(v,i,a){var w=1,n=v;for(var j=Math.max(0,i-w);j<=Math.min(a.length-1,i+w);j++)n+=a[j];return n/(w*2+1)});

    charts.price.setOption({

/* ========== 5. 地区销量 - 气泡热力矩阵 + 排名条 + 聚类对比雷达（完全重新设计） ========== */
function renderRegionSales(data) {
    console.log('[Region] === renderRegionSales called ===');
    console.log('[Region] Data keys:', Object.keys(data||{}));
    var rg=data.region_predictions||[];
    console.log('[Region] Region predictions count:', rg.length);
    if(rg.length > 0) {
        console.log('[Region] First item:', JSON.stringify(rg[0]).substring(0,200));
        console.log('[Region] cluster type:', typeof rg[0].cluster, 'value:', rg[0].cluster);
    }
    
    var ca=data.cluster_analysis||{}, mm=data.model_metrics||{};
    var cc=0;
    if(ca.clusters){var ck=Object.keys(ca.clusters);if(ck.length>0)cc=ca.clusters[ck[0]].cluster_count||0;}

    $('#regionMetrics').html(
        '<div class="metric-item"><div class="metric-value">'+(mm.r2_score||0)+'</div><div class="metric-label">R\u00B2得分</div></div>'+
        '<div class="metric-item"><div class="metric-value">'+(mm.provinces_analyzed||0)+'</div><div class="metric-label">省份总数</div></div>'+
        '<div class="metric-item"><div class="metric-value" style="font-size:13px;color:#10b981">'+cc+'</div><div class="metric-label">聚类分组</div></div>'
    );

    var sbp=rg.slice().sort(function(a,b){return b.potential_index-a.potential_index});
    var clCols=['#4facfe','#10b981','#f59e0b','#ef4444'], clNames=['潜力市场','成熟市场','成长市场','待开发'];

    /* 按聚类分组排序后构建数据 - 直接使用cluster数字值(0-3) */
    var byCl=[[],[],[],[]];
    for(var bi=0;bi<rg.length;bi++){
        var cVal = rg[bi].cluster;
        var ci = (typeof cVal === 'number' && !isNaN(cVal)) ? Math.floor(cVal) : 4;
        if(ci < 0) ci = 0;
        if(ci > 3) ci = 4;
        if(ci <= 3 && byCl[ci]) {
            byCl[ci].push(rg[bi]);
        } else {
            byCl[0].push(rg[bi]); // 默认放入第一组
        }
    }
    for(var gi=0;gi<4;gi++) {
        if(byCl[gi]) byCl[gi].sort(function(a,b){return b.potential_index-a.potential_index});
    }

    var allSorted=[];
    for(var gk=0;gk<4;gk++) {
        if(byCl[gk]) allSorted=allSorted.concat(byCl[gk]);
    }

    /* 左侧：气泡散点热力矩阵 - 解决密集点问题！使用大小+颜色+位置三重编码 */
    var bubbleData=[];
    var hmMax=0;
    for(var bi2=0;bi2<allSorted.length;bi2++){
        var r=allSorted[bi2];
        if(!r) continue;
        var cVal2 = r.cluster;
        var ci2 = (typeof cVal2 === 'number' && !isNaN(cVal2)) ? Math.floor(cVal2) : 0;
        ci2 = Math.max(0, Math.min(ci2, 3)); // 确保在0-3范围内
        bubbleData.push({
            value:[bi2, r.potential_index||0, (r.actual_sales/100000000)||0.5, ci2],
            itemStyle:{
                color:clCols[ci2]||'#4facfe',
                opacity:0.85,
                borderWidth:2,
                borderColor:(clCols[ci2]||'#4facfe')+'60'
            }
        });
        if((r.potential_index||0)>hmMax)hmMax=r.potential_index||0;
    }

    charts.region.setOption({
        backgroundColor:'transparent',
        tooltip:{
            backgroundColor:'rgba(15,20,35,0.96)',
            borderColor:'#10b981',borderWidth:1,
            textStyle:{color:'#e2e8f0',fontSize:12},
            formatter:function(p){
                if(p.dataIndex<0||p.dataIndex>=allSorted.length)return'';
                var r2=allSorted[p.dataIndex];if(!r2)return'';
                var ci3 = (typeof r2.cluster === 'number')?Math.min(Math.max(r2.cluster,0),3):4;
                var cColor = clCols[ci3];
                var html = '<div style="padding:10px 14px">';
                html += '<b style="color:#10b981;font-size:14px">'+r2.province+'</b><br/>';
                html += '<div style="margin-top:6px">';
                html += '潜力指数: <b style="color:#10b981">'+r2.potential_index+'</b><br/>';
                html += '实际销量: '+(r2.actual_sales/1000000).toFixed(1)+'M<br/>';
                html += '市场份额: '+r2.market_share_pct.toFixed(2)+'%<br/>';
                html += '聚类类型: <span style="color:'+cColor+'">'+r2.cluster_label+'</span>';
                html += '</div></div>';
                return html;
            },
            extraCssText:'box-shadow:0 8px 32px rgba(0,0,0,0.4);border-radius:8px'
        },
        grid:{left:'4%',right:'6%',bottom:'26%',top:'4%',containLabel:true},
        xAxis:{type:'value',min:-1,max:allSorted.length,show:false,axisLine:{show:false},splitLine:{show:false}},
        yAxis:{type:'value',name:'潜力指数',nameTextStyle:{color:'#94a3b8',fontSize:11,padding:[0,0,0,25]},
               axisLabel:{color:'#64748b',fontSize:10},
               splitLine:{lineStyle:{color:'rgba(99,102,241,0.04)',type:'dashed'}}},
        visualMap:[
            {show:false,dimension:3,min:0,max:3,inRange:{color:clCols}},
            {show:true,min:0,max:hmMax||100,calculable:true,orient:'horizontal',left:'center',bottom:2,
             inRange:{color:['#1e293b','#334155','#475569','#64748b','#10b981','#22d3ee']},
             textStyle:{color:'#94a3b8',fontSize:9},itemWidth:14,itemHeight:80,
             formatter:function(v){return v.toFixed(0)},dimension:1}
        ],
        series:[{
            type:'scatter',
            symbolSize:function(data){
                var size=Math.sqrt(data[2])*22;
                return Math.max(Math.min(size,50),10);
            },
            data:bubbleData,
            emphasis:{
                itemStyle:{
                    shadowBlur:25,
                    shadowColor:'rgba(16,185,129,0.5)',
                    shadowOffsetY:6,
                    borderColor:'#fff',
                    borderWidth:2.5,
                    opacity:1
                },
                scale:1.2
            },
            animationDuration:1400,
            animationEasingUpdate:'elasticOut',
            label:{
                show:true,
                position:'top',
                formatter:function(p){
                    return allSorted[p.dataIndex]?allSorted[p.dataIndex].province:'';
                },
                fontSize:9,
                color:'#94a3b8',
                distance:6,
                textBorderColor:'rgba(10,14,26,0.8)',
                textBorderWidth:3
            }
        }],
        graphic:[]
    }, true);

    /* 右侧中：Top15排名条 - 增强渐变和阴影效果 */
    var t15=sbp.slice(0,14), t15n=[], t15v=[];
    for(var ti=0;ti<t15.length;ti++){
        t15n.push(t15[ti].province);
        var val=t15[ti].actual_sales/1000000;
        var isTop3Region = ti < 3;
        t15v.push({
            value:val,
            itemStyle:{
                color:new echarts.graphic.LinearGradient(0,0,1,0,[
                    {offset:0,color:'#059669'},
                    {offset:0.4,color:'#10b981'},
                    {offset:1,color:'#34d399'}
                ]),
                borderRadius:[0,8,8,0],
                shadowBlur:isTop3Region?15:0,
                shadowColor:isTop3Region?'rgba(16,185,129,0.35)':'transparent'
            }
        });
    }
    charts.regionBar.setOption({
        backgroundColor:'transparent',
        tooltip:{
            trigger:'axis',
            backgroundColor:'rgba(15,20,35,0.96)',
            borderColor:'#10b981',borderWidth:1,
            textStyle:{color:'#e2e8f0',fontSize:12},
            formatter:function(p){
                var d=t15[p[0].dataIndex];if(!d)return'';
                return'<div style="padding:8px 12px">'+
                    '<b style="color:#10b981;font-size:13px">'+d.province+'</b><br/>'+
                    '<span style="color:#94a3b8">销量:</span> <b>'+(d.actual_sales/1000000).toFixed(1)+'M</b><br/>'+
                    '<span style="color:#94a3b8">份额:</span> '+d.market_share_pct.toFixed(2)+'%<br/>'+
                    '<span style="color:#94a3b8">潜力:</span> <b style="color:#10b981;font-size:14px">'+d.potential_index+'</b>'+
                    '</div>';
            },
            extraCssText:'box-shadow:0 8px 32px rgba(0,0,0,0.4);border-radius:8px'
        },
        grid:{left:'3%',right:'14%',bottom:'3%',top:'6px',containLabel:true},
        xAxis:{type:'value',axisLabel:{color:'#64748b'},splitLine:{lineStyle:{color:'rgba(99,102,241,0.03)',type:'dashed'}},
               axisLine:{lineStyle:{color:'rgba(99,102,241,0.08)'}}},
        yAxis:{type:'category',data:t15n,axisLabel:{color:'#94a3b8',fontSize:10,fontWeight:500},inverse:true},
        series:[{
            type:'bar',data:t15v,barWidth:'58%',
            label:{
                show:true,position:'right',color:'#10b981',fontSize:11,fontWeight:700,
                formatter:function(p){return p.value.toFixed(1)+'M'},
                textShadowColor:'rgba(16,185,129,0.3)',textShadowBlur:4
            },
            emphasis:{itemStyle:{shadowBlur:20,shadowColor:'rgba(16,185,129,0.45)'}},
            animationDuration:1100,animationEasing:'cubicOut'
        }]
    }, true);

    /* 右侧：聚类特征对比雷达 - 完全增强版 */
    var rRadarInd=['平均潜力指数','总销量占比','省份数量','平均增长率','策略强度'];
    var rRadarData=[[]];
    for(var ci4=0;ci4<4;ci4++){
        var grp=byCl[ci4];
        var avgPot=grp.reduce(function(s,r){return s+r.potential_index},0)/Math.max(grp.length,1)||0;
        var totSales=grp.reduce(function(s,r){return s+r.actual_sales},0);
        var totalAll=rg.reduce(function(s,r){return s+r.actual_sales},0)||1;
        var avgGrw=(grp.reduce(function(s,r){return s+(r.predicted_sales||r.actual_sales)/(r.actual_sales||1)-1},0)/Math.max(grp.length,1)*50+50);
        rRadarData[0].push([avgPot, totSales/totalAll*100, grp.length/rg.length*100, avgGrw, Math.min(grp.length*18,100)]);
    }
    var rrMaxArr=rRadarData[0].map(function(arr){return arr[0]});
    var rrMax=Math.max.apply(null,rrMaxArr)||1;
    rRadarData[0]=rRadarData[0].map(function(v){return[v[0]/rrMax*100,v[1],v[2],v[3],v[4]]});

    charts.regionRadar.setOption({
        backgroundColor:'transparent',
        tooltip:{backgroundColor:'rgba(15,20,35,0.96)',borderColor:'#a855f7',borderWidth:1,textStyle:{color:'#e2e8f0'}},
        radar:{
            indicator:rRadarInd.map(function(n,i){return{name:n,max:112,color:'#94a3b8',fontSize:10}}),
            shape:'polygon',splitNumber:4,radius:'64%',
            axisName:{color:'#94a3b8',fontSize:10,fontWeight:500},
            splitLine:{lineStyle:{color:'rgba(99,102,241,0.08)',type:'dashed'}},
            splitArea:{areaStyle:{color:['rgba(79,172,254,0.04)','rgba(16,185,129,0.04)','rgba(245,158,11,0.04)','rgba(239,68,68,0.04)']}},
            axisLine:{lineStyle:{color:'rgba(99,102,241,0.12)'}}
        },
        legend:{
            data:clNames,textStyle:{color:'#94a3b8',fontSize:10,bold:true},bottom:2,left:'center',itemGap:14,
            itemWidth:16,itemHeight:16,icon:'roundRect'
        },
        series:[{
            type:'radar',data:rRadarData[0].map(function(v,i){return{
                value:v,name:clNames[i],
                symbol:'circle',symbolSize:7,
                lineStyle:{color:clCols[i],width:2.8,shadowColor:clCols[i],shadowBlur:6},
                areaStyle:{color:new echarts.graphic.RadialGradient(0.5,0.5,1,[{offset:0,color:clCols[i]+'38'},{offset:1,color:clCols[i]+'06'}])},
                itemStyle:{color:clCols[i],borderColor:'#0a0e1a',borderWidth:2}
            }}),
            emphasis:{focus:'series',animationDuration:350}
        }],
        animationDuration:1200
    }, true);

    var tb='<table><tr><th>省份</th><th>实际销量(M)</th><th>市场份额%</th><th>聚类</th><th>潜力</th><th>策略</th></tr>';
    for(var ri=0;ri<Math.min(sbp.length,12);ri++){
        var r=sbp[ri];
        tb+='<tr><td><b>'+r.province+'</b></td><td>'+(r.actual_sales/1000000).toFixed(1)+'</td><td>'+r.market_share_pct.toFixed(3)+'%'+
            '</td><td><span class="tag tag-medium">'+r.cluster_label+'</span></td><td><b style="color:#10b981">'+r.potential_index+'</b></td><td style="font-size:10px">'+r.strategy+'</td></tr>';
    } tb+='</table>'; $('#regionTable').html(tb);
}

/* ========== 6. 品类趋势 - Stream堆叠面积图 + 品类属性雷达（增强版） ========== */
function renderCategoryTrend(data) {
    var tr=data.category_trends||[], sum=data.summary||{}, po=data.portfolio_optimization||[];
    $('#trendMetrics').html(
        '<div class="metric-item"><div class="metric-value">'+(sum.total_categories||0)+'</div><div class="metric-label">品类总数</div></div>'+
        '<div class="metric-item"><div class="metric-value" style="font-size:12px;color:#a855f7">'+(sum.highest_potential||'-')+'</div><div class="metric-label">最高潜力品类</div></div>'+
        '<div class="metric-item"><div class="metric-value" style="font-size:12px;color:#22d3ee">'+(sum.dominant_category||'-')+'</div><div class="metric-label">当前主导品类</div></div>'
    );

    var cats=[], curS=[], futS=[];
    for(var cti=0;cti<tr.length;cti++){cats.push(tr[cti].category);curS.push(tr[cti].current_market_share);futS.push(tr[cti].future_market_share_12m)}

    var streamSeries=[];
    var streamColors=['#a855f7','#ec4899','#22d3ee','#10b981','#f59e0b','#ef4444','#6366f1'];
    for(var si=0;si<tr.length;si++){
        streamSeries.push({
            name:tr[si].category,type:'line',stack:'总量',smooth:true,symbol:'none',
            lineStyle:{width:0},
            areaStyle:{
                opacity:0.85,
                color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:streamColors[si]},{offset:1,color:streamColors[si]+'15'}])
            },
            data:[curS[si],futS[si]],
            emphasis:{focus:'series',scale:true}
        });
    }

    charts.trend.setOption({
        backgroundColor:'transparent',
        tooltip:{
            trigger:'axis',
            backgroundColor:'rgba(15,20,35,0.96)',
            borderColor:'#a855f7',borderWidth:1,
            textStyle:{color:'#e2e8f0',fontSize:12},
            formatter:function(p){
                if(!p||!p.length)return'';
                var res='<div style="padding:8px 12px">';
                for(var pi=0;pi<p.length;pi++){
                    if(p[pi].seriesName&&p[pi].value!=null){
                        res+='<span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:'+streamColors[cats.indexOf(p[pi].seriesName)]+';margin-right:6px"></span>'+
                             '<b>'+p[pi].seriesName+'</b>: '+p[pi].value.toFixed(1)+'%<br/>';
                    }
                }
                return res+'</div>';
            },
            extraCssText:'box-shadow:0 8px 32px rgba(0,0,0,0.4);border-radius:8px'
        },
        legend:{
            data:cats,textStyle:{color:'#94a3b8',fontSize:11},top:6,itemGap:12,type:'scroll',width:'56%',
            itemWidth:14,itemHeight:8,borderRadius:4
        },
        grid:{left:'3%',right:'4%',bottom:'8%',top:'42px',containLabel:true},
        xAxis:{type:'category',data:['当前份额','未来12月预期'],axisLabel:{color:'#64748b',fontSize:13,fontWeight:500},
               axisLine:{lineStyle:{color:'rgba(168,85,247,0.15)'}},axisTick:{show:false}},
        yAxis:{type:'value',name:'市场份额 %',axisLabel:{color:'#64748b',formatter:'{value}%'},max:108,
               splitLine:{lineStyle:{color:'rgba(99,102,241,0.04)',type:'dashed'}},
               nameTextStyle:{color:'#94a3b8',fontSize:11}},
        series:streamSeries,
        animationDurationUpdate:1400,
        animationEasingUpdate:'cubicInOut'
    }, true);

    /* 品类属性雷达 - 增强版 */
    var attrNames=['必需性','购买频率','季节性','价格敏感度','增长潜力'];
    var attrVals=[[]];
    var attrRaw=[
        [90,95,30,80,75],
        [60,60,50,40,68],
        [65,55,45,35,72],
        [50,20,30,25,55],
        [55,75,80,60,82],
        [40,15,25,20,45],
        [55,50,40,35,60]
    ];
    for(var ai=0;ai<attrRaw.length&&ai<tr.length;ai++) attrVals[0].push(attrRaw[ai]);

    charts.trendRadar.setOption({
        backgroundColor:'transparent',
        tooltip:{backgroundColor:'rgba(15,20,35,0.96)',borderColor:'#a855f7',borderWidth:1,textStyle:{color:'#e2e8f0'}},
        radar:{
            indicator:attrNames.map(function(n,i){return{name:n,max:100,color:'#94a3b8',fontSize:10}}),
            shape:'polygon',splitNumber:4,radius:'66%',
            axisName:{color:'#94a3b8',fontSize:10,fontWeight:500},
            splitLine:{lineStyle:{color:'rgba(99,102,241,0.08)',type:'dashed'}},
            splitArea:{areaStyle:{color:['rgba(168,85,247,0.03)','rgba(236,72,153,0.03)','rgba(34,211,238,0.03)','rgba(16,185,129,0.03)']}},
            axisLine:{lineStyle:{color:'rgba(99,102,241,0.12)'}}
        },
        legend:{
            data:cats,textStyle:{color:'#94a3b8',fontSize:9},bottom:2,left:'center',itemGap:8,
            itemWidth:14,itemHeight:14,icon:'roundRect'
        },
        series:[{
            type:'radar',data:attrVals[0].map(function(v,i){return{
                value:v,name:cats[i],
                symbol:'circle',symbolSize:6,
                lineStyle:{color:streamColors[i],width:2.2,shadowColor:streamColors[i],shadowBlur:4},
                areaStyle:{color:new echarts.graphic.RadialGradient(0.5,0.5,1,[{offset:0,color:streamColors[i]+'30'},{offset:1,color:streamColors[i]+'04'}])},
                itemStyle:{color:streamColors[i],borderColor:'#0a0e1a',borderWidth:1.5}
            }}),
            emphasis:{focus:'series',animationDuration:300}
        }],
        animationDuration:1100
    }, true);

    var tb='<table><tr><th>品类</th><th>当前%</th><th>未来%</th><th>变化</th><th>趋势</th><th>潜力</th><th>建议</th></tr>';
    for(var tri=0;tri<tr.length;tri++){
        var t=tr[tri]; var cc=t.share_change_pct>0?'tag-high':(t.share_change_pct<0?'tag-low':'tag-medium'); var cp=t.share_change_pct>0?'+':'';
        tb+='<tr><td><b>'+t.category+'</b></td><td>'+t.current_market_share.toFixed(1)+'%</td><td>'+t.future_market_share_12m.toFixed(1)+'%'+
            '</td><td><span class="tag '+cc+'">'+cp+t.share_change_pct.toFixed(2)+'%</span></td><td>'+t.trend_direction+'</td><td>'+t.growth_potential_level.split(' ')[0]+'</td><td style="font-size:10px">'+t.recommendation+'</td></tr>';
    } tb+='</table>'; $('#trendTable').html(tb);

    var ih='<div class="insight-title">品类组合优化建议</div>';
    for(var pi=0;pi<po.length;pi++) ih+='<div style="margin:4px 0;padding-left:12px">\u2022 '+po[pi]+'</div>';
    $('#trendInsight').html(ih);
}
/*]]>*/</script>
