<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('每种商品的销量')"/>
</head>
<body class="gray-bg">
<div class="wrapper wrapper-content animated fadeInRight">
    <div class="row">
        <div class="col-sm-12">
            <div class="ibox float-e-margins">
                <div class="ibox-title">
                    <h5>每种商品的销量</h5>
                </div>
                <div class="ibox-content">
                    <div class="echarts" style="height: 400px" id="analyseOne"></div>
                </div>
            </div>
        </div>


    </div>



</div>
<th:block th:include="include :: footer"/>
<th:block th:include="include :: echarts-js"/>
<script type="text/javascript">
    var prefix = ctx + "project/taobaoGoodsAnalyse";
    $(function () {
        getData()
    });

    function getData() {
        $.get(prefix + "/categoryGoodsSales", function (result) {
            var analyseOne = echarts.init(document.getElementById("analyseOne"));
            var analyseOneOption = {
                tooltip: {
                    trigger: 'axis',
                    axisPointer: { type: 'shadow' }
                },
                legend: {
                    data: ['销量'],
                    top: '5%'
                },
                grid: {
                    left: '5%',
                    right: '10%',
                    bottom: '10%',
                    containLabel: true
                },
                xAxis: {
                    type: 'category',
                    data: [], // 这里填商品类别
                    axisLabel: {
                        rotate: 45,
                        formatter: function(value) {
                            if (value.length > 6) {
                                return value.substring(0, 6) + '...';
                            } else {
                                return value;
                            }
                        }
                    },
                    axisLine: {
                        lineStyle: {
                            color: '#111111'
                        }
                    }
                },
                yAxis: {
                    type: 'value',
                    name: '销量',
                    nameTextStyle: {
                        color: '#333'
                    },
                    axisLine: {
                        lineStyle: {
                            color: '#ccc'
                        }
                    },
                    axisLabel: {
                        color: '#333'
                    },
                    splitLine: {
                        lineStyle: {
                            type: 'dashed',
                            color: '#ddd'
                        }
                    }
                },
                series: [
                    {
                        name: '销量',
                        type: 'bar',
                        data: [], // 这里填销量数据
                        barWidth: 30,
                        itemStyle: {
                            color: '#FF7F50' // 颜色
                        },
                        label: {
                            show: true,
                            position: 'top',
                            color: '#FF7F50',
                            formatter: function(params) {
                                return params.value.toLocaleString(); // 格式化数字
                            }
                        }
                    }
                ]
            }
            for (let i = 0; i < result.data.length; i++) {
                analyseOneOption.xAxis.data.push(result.data[i].goods_category)
                analyseOneOption.series[0].data.push(result.data[i].total_sales)
            }
            analyseOne.setOption(analyseOneOption);
            $(window).resize(analyseOne.resize);
        });

    }

</script>
</body>
</html>
